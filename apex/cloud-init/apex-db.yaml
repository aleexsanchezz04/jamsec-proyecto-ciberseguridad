#cloud-config
# ============================================================================
#  apex-db — Servidor de base de datos del cliente (LAN interna)
#  Debian 13 + MariaDB.  10.30.10.10/24, gw 10.30.10.1
#  VULNERABILIDADES INTENCIONADAS (objetivo de auditoría):
#    - MariaDB escuchando en 0.0.0.0 (expuesta a toda la red)
#    - root@'%' con contraseña débil 'toor' (acceso remoto de superusuario)
#    - Datos personales/financieros ficticios sin cifrar
# ============================================================================
hostname: apex-db
fqdn: apex-db.apex-gestoria.cat
manage_etc_hosts: true

users:
  - name: apex
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: Apex2026!
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHJrzrkaIbwLspktR5Xg/s/nwWklhrQXUqp1vbZgWyYU admin@debian-server
ssh_pwauth: true

package_update: true
packages:
  - mariadb-server
  - qemu-guest-agent
  - bind9-dnsutils

write_files:
  - path: /etc/mysql/mariadb.conf.d/99-apex.cnf
    permissions: '0644'
    content: |
      [mysqld]
      # MALA PRÁCTICA: BBDD accesible desde cualquier interfaz de red
      bind-address = 0.0.0.0
      skip-name-resolve

  - path: /root/seed.sql
    permissions: '0600'
    content: |
      CREATE DATABASE IF NOT EXISTS apexgestoria;
      USE apexgestoria;

      CREATE TABLE IF NOT EXISTS usuarios (
        id INT AUTO_INCREMENT PRIMARY KEY,
        usuario VARCHAR(50), password VARCHAR(100), rol VARCHAR(20)
      );
      INSERT INTO usuarios (usuario,password,rol) VALUES
        ('admin','Apex.2026!','admin'),
        ('jmorales','gestoria2024','contable'),
        ('soporte','soporte123','soporte');

      CREATE TABLE IF NOT EXISTS clientes (
        id INT AUTO_INCREMENT PRIMARY KEY,
        nombre VARCHAR(100), nif VARCHAR(20), email VARCHAR(100), iban VARCHAR(34)
      );
      INSERT INTO clientes (nombre,nif,email,iban) VALUES
        ('Construcciones Vidal SL','B12345678','info@vidalsl.cat','ES7620770024003102575766'),
        ('Perruqueria Anna','X1234567L','anna@perruqueria.cat','ES9121000418450200051332'),
        ('Tallers Puig SCP','J87654321','admin@tallerspuig.cat','ES7100302053091234567895');

      CREATE TABLE IF NOT EXISTS nominas (
        id INT AUTO_INCREMENT PRIMARY KEY,
        empleado VARCHAR(100), dni VARCHAR(20), salario_bruto DECIMAL(10,2), iban VARCHAR(34)
      );
      INSERT INTO nominas (empleado,dni,salario_bruto,iban) VALUES
        ('Joan Morales Pi','39123456A',2450.00,'ES1000492352082414205416'),
        ('Marta Soler Vidal','39654321B',2780.50,'ES8021000813610123456789');

      -- MALA PRÁCTICA: superusuario remoto con contraseña débil
      ALTER USER 'root'@'localhost' IDENTIFIED BY 'toor';
      CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED BY 'toor';
      GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
      -- usuario de la aplicación web (también credencial débil)
      CREATE USER IF NOT EXISTS 'apexweb'@'%' IDENTIFIED BY 'apexweb';
      GRANT ALL PRIVILEGES ON apexgestoria.* TO 'apexweb'@'%';
      FLUSH PRIVILEGES;

runcmd:
  - systemctl enable --now qemu-guest-agent
  - systemctl enable --now mariadb
  - sleep 5
  - mysql < /root/seed.sql
  - systemctl restart mariadb

final_message: "apex-db cloud-init COMPLETADO tras $UPTIME segundos"
