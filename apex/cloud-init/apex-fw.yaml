#cloud-config
# ============================================================================
#  apex-fw — Firewall perimetral del CLIENTE Apex Gestoría
#  Debian 13 + nftables.  Es deliberadamente MENOS estricto que el de JAMSEC
#  (refleja un cliente con malas prácticas -> hallazgos de auditoría).
#
#    net0 vmbr0   -> WAN  172.20.17.230/24 gw 172.20.17.5  (.221 estaba ocupada)
#    net1 vmbr110 -> LAN  10.30.10.1/24
#    net2 vmbr120 -> DMZ  10.30.20.1/24
# ============================================================================
hostname: apex-fw
fqdn: apex-fw.apex-gestoria.cat
manage_etc_hosts: true

users:
  - name: apex
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: Apex2026!
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHJrzrkaIbwLspktR5Xg/s/nwWklhrQXUqp1vbZgWyYU admin@debian-server
ssh_pwauth: true

package_update: true
packages:
  - nftables
  - tcpdump
  - bind9-dnsutils
  - qemu-guest-agent

write_files:
  - path: /etc/sysctl.d/99-apex-fw.conf
    permissions: '0644'
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.disable_ipv6 = 1
      net.ipv6.conf.default.disable_ipv6 = 1

  - path: /etc/nftables.conf
    permissions: '0755'
    content: |
      #!/usr/sbin/nft -f
      # Firewall perimetral del cliente Apex Gestoría
      flush ruleset

      define NET_LAN = 10.30.10.0/24
      define NET_DMZ = 10.30.20.0/24
      define NET_APEX = 10.30.0.0/16
      define WAN_IP = 172.20.17.230
      define WEB = 10.30.20.10
      define SRV = 10.30.10.20

      table inet filter {
          chain input {
              type filter hook input priority filter; policy drop;
              iif "lo" accept
              ct state established,related accept
              ct state invalid drop
              ip protocol icmp accept
              # Gestión del firewall: SSH solo desde la red de tránsito
              ip saddr 172.20.17.0/24 tcp dport 22 accept
              ip saddr $NET_LAN tcp dport 22 accept
          }
          chain forward {
              type filter hook forward priority filter; policy drop;
              ct state established,related accept
              ct state invalid drop

              # Servicios publicados a internet (tras DNAT). Origen externo a Apex.
              ip saddr != $NET_APEX ip daddr $WEB tcp dport { 80, 443, 22 } accept
              ip saddr != $NET_APEX ip daddr $SRV tcp dport 21 accept
              ip saddr != $NET_APEX ip daddr $SRV tcp dport 30000-30100 accept

              # MALA PRÁCTICA (hallazgo): la DMZ tiene acceso completo a la LAN
              ip saddr $NET_DMZ ip daddr $NET_LAN accept

              # Salida a internet de LAN y DMZ
              ip saddr $NET_LAN accept
              ip saddr $NET_DMZ accept
          }
          chain output {
              type filter hook output priority filter; policy accept;
          }
      }

      table ip nat {
          chain prerouting {
              type nat hook prerouting priority dstnat; policy accept;
              # Web pública
              ip daddr $WAN_IP tcp dport 80  dnat to $WEB:80
              ip daddr $WAN_IP tcp dport 443 dnat to $WEB:443
              # SSH del servidor web expuesto a internet (hallazgo: puerto 2222)
              ip daddr $WAN_IP tcp dport 2222 dnat to $WEB:22
              # FTP del servidor interno expuesto (hallazgo)
              ip daddr $WAN_IP tcp dport 21 dnat to $SRV:21
              ip daddr $WAN_IP tcp dport 30000-30100 dnat to $SRV
          }
          chain postrouting {
              type nat hook postrouting priority srcnat; policy accept;
              ip saddr $NET_APEX ip daddr != $NET_APEX masquerade
          }
      }

runcmd:
  - sysctl --system
  - systemctl enable --now qemu-guest-agent
  - systemctl enable nftables
  - nft -f /etc/nftables.conf
  - systemctl restart nftables

final_message: "apex-fw cloud-init COMPLETADO tras $UPTIME segundos"
