#cloud-config
# ============================================================================
#  jamsec-web — Servidor web corporativo de JAMSEC (DMZ)
#  Debian 13 + nginx.  Zona DMZ 10.20.20.10/24, gw 10.20.20.1 (jamsec-fw)
#  Publicado a internet vía DNAT en jamsec-fw (WAN 172.20.17.211 :80/:443)
# ============================================================================
hostname: jamsec-web
fqdn: jamsec-web.jamsec.cat
manage_etc_hosts: true

users:
  - name: jamsec
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: Jamsec2026!
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHJrzrkaIbwLspktR5Xg/s/nwWklhrQXUqp1vbZgWyYU admin@debian-server
ssh_pwauth: true

package_update: true
packages:
  - nginx
  - qemu-guest-agent
  - bind9-dnsutils

write_files:
  - path: /var/www/html/index.html
    permissions: '0644'
    content: |
      <!DOCTYPE html>
      <html lang="es">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>JAMSEC · Ciberseguridad</title>
        <style>
          :root{--bg:#0b1020;--ac:#19c37d;--tx:#e6eaf2;--mut:#8b93a7}
          *{box-sizing:border-box;margin:0;padding:0}
          body{font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
          header{padding:80px 24px 40px;text-align:center;background:radial-gradient(1200px 400px at 50% -50%,rgba(25,195,125,.25),transparent)}
          .logo{font-size:2.6rem;font-weight:800;letter-spacing:2px}
          .logo span{color:var(--ac)}
          .tag{color:var(--mut);margin-top:8px;font-size:1.1rem}
          main{max-width:960px;margin:0 auto;padding:24px}
          .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:24px}
          .card{background:#121a30;border:1px solid #1e2942;border-radius:14px;padding:24px}
          .card h3{color:var(--ac);margin-bottom:8px}
          footer{text-align:center;color:var(--mut);padding:40px;font-size:.9rem}
        </style>
      </head>
      <body>
        <header>
          <div class="logo">JAM<span>SEC</span></div>
          <div class="tag">Servicios gestionados de ciberseguridad</div>
        </header>
        <main>
          <p>Somos <strong>JAMSEC</strong>, una empresa especializada en la
          protección, monitorización y auditoría de infraestructuras
          tecnológicas. Operamos un SOC propio 24/7 y ofrecemos servicios de
          Red Team y Blue Team a nuestros clientes.</p>
          <div class="grid">
            <div class="card"><h3>Auditoría</h3>Pruebas de intrusión de red, web y sistemas con informes técnicos y ejecutivos.</div>
            <div class="card"><h3>Monitorización</h3>SIEM e IDS/IPS gestionados (Wazuh + Suricata) sobre infraestructuras de cliente.</div>
            <div class="card"><h3>Respuesta</h3>Gestión de incidentes, notificación de brechas y planes de continuidad.</div>
          </div>
        </main>
        <footer>© 2026 JAMSEC · jamsec.cat · Servidor corporativo en DMZ</footer>
      </body>
      </html>

runcmd:
  - systemctl enable --now qemu-guest-agent
  - systemctl enable --now nginx
  - systemctl restart nginx

final_message: "jamsec-web cloud-init COMPLETADO tras $UPTIME segundos"
