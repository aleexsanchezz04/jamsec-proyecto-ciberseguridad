#cloud-config
# ============================================================================
#  jamsec-fw — Firewall perimetral de la infraestructura JAMSEC
#  Debian 13 (cloud-init). Autoconfiguración en el primer arranque.
#
#  Interfaces (asignadas por cloud-init network / PVE ipconfigN):
#    net0 vmbr0  -> WAN     172.20.17.240/24  gw 172.20.17.5  (.211 fue ocupada)
#    net1 vmbr10 -> SOC     10.20.10.1/24
#    net2 vmbr20 -> DMZ     10.20.20.1/24
#    net3 vmbr30 -> SRV     10.20.30.1/24
#
#  El ruleset nftables filtra por SUBRED (no por nombre de interfaz) para ser
#  robusto frente a cómo el kernel nombre las NICs.
# ============================================================================
hostname: jamsec-fw
fqdn: jamsec-fw.jamsec.cat
manage_etc_hosts: true

users:
  - name: jamsec
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHJrzrkaIbwLspktR5Xg/s/nwWklhrQXUqp1vbZgWyYU admin@debian-server

chpasswd:
  expire: false
  users:
    - name: jamsec
      password: Jamsec2026!
      type: text
ssh_pwauth: true

package_update: true
packages:
  - nftables
  - tcpdump
  - dnsutils
  - qemu-guest-agent

write_files:
  - path: /etc/sysctl.d/99-jamsec-fw.conf
    permissions: '0644'
    content: |
      # Routing + hardening del firewall JAMSEC
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.disable_ipv6 = 1
      net.ipv6.conf.default.disable_ipv6 = 1
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv4.conf.all.log_martians = 1

  - path: /etc/nftables.conf
    permissions: '0755'
    content: |
      #!/usr/sbin/nft -f
      # Ruleset del firewall perimetral JAMSEC
      flush ruleset

      define NET_SOC = 10.20.10.0/24
      define NET_DMZ = 10.20.20.0/24
      define NET_SRV = 10.20.30.0/24
      define NET_JAMSEC = 10.20.0.0/16
      define WAN_IP = 172.20.17.240
      define WEB_DMZ = 10.20.20.10

      table inet filter {
          chain input {
              type filter hook input priority filter; policy drop;
              iif "lo" accept
              ct state established,related accept
              ct state invalid drop
              ip protocol icmp accept
              # Gestión SSH del firewall desde tránsito (WAN) y desde el SOC
              ip saddr 172.20.17.0/24 tcp dport 22 accept
              ip saddr $NET_SOC tcp dport 22 accept
              # DHCP/DNS no se sirven en el firewall
          }

          chain forward {
              type filter hook forward priority filter; policy drop;
              ct state established,related accept
              ct state invalid drop

              # SOC (analistas + SIEM): acceso completo a todas las zonas e internet
              ip saddr $NET_SOC accept

              # SRV (servicios internos): SOLO salida a internet, NO a otras zonas internas
              ip saddr $NET_SRV ip daddr != { $NET_SOC, $NET_DMZ } accept

              # DMZ: SOLO salida a internet (updates). NO puede ir a SRV ni SOC.
              # (si comprometen la web pública, no alcanzan la red interna)
              ip saddr $NET_DMZ ip daddr != { $NET_SOC, $NET_SRV } accept

              # Internet/tránsito -> web pública en DMZ (tras DNAT): SOLO desde
              # fuera de la red JAMSEC (impide que SRV/otras zonas usen el atajo)
              ip saddr != $NET_JAMSEC ip daddr $WEB_DMZ tcp dport { 80, 443 } accept

              # Todo lo demás: DROP por política
          }

          chain output {
              type filter hook output priority filter; policy accept;
          }
      }

      table ip nat {
          chain prerouting {
              type nat hook prerouting priority dstnat; policy accept;
              # Publicación de la web corporativa: WAN:80/443 -> jamsec-web
              ip daddr $WAN_IP tcp dport 80 dnat to $WEB_DMZ:80
              ip daddr $WAN_IP tcp dport 443 dnat to $WEB_DMZ:443
          }
          chain postrouting {
              type nat hook postrouting priority srcnat; policy accept;
              # NAT de las redes internas hacia internet
              ip saddr $NET_JAMSEC ip daddr != $NET_JAMSEC masquerade
          }
      }

runcmd:
  - sysctl --system
  - systemctl enable --now qemu-guest-agent
  - systemctl enable nftables
  - nft -f /etc/nftables.conf
  - systemctl restart nftables

final_message: "jamsec-fw cloud-init COMPLETADO tras $UPTIME segundos"
