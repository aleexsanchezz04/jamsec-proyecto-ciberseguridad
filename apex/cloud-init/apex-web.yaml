#cloud-config
# ============================================================================
#  apex-web — Servidor web público del cliente (DMZ)  10.30.20.10/24
#  Debian 13 + Apache + PHP + MariaDB client.
#  VULNERABILIDADES INTENCIONADAS (objetivo de auditoría):
#    - SQL injection en el formulario de login (bypass de autenticación)
#    - Subida de ficheros sin validación (-> webshell -> RCE)
#    - Exposición de datos de clientes
#    - Usuario SSH 'soporte' con contraseña débil (fuerza bruta)
#    - SSH del host publicado a internet (apex-fw WAN:2222)
# ============================================================================
hostname: apex-web
fqdn: apex-web.apex-gestoria.cat
manage_etc_hosts: true

users:
  - name: apex
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: Apex2026!
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHJrzrkaIbwLspktR5Xg/s/nwWklhrQXUqp1vbZgWyYU admin@debian-server
  # MALA PRÁCTICA (hallazgo): usuario de soporte con contraseña débil
  - name: soporte
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: soporte123
ssh_pwauth: true

package_update: true
packages:
  - apache2
  - php
  - libapache2-mod-php
  - php-mysql
  - qemu-guest-agent
  - bind9-dnsutils

write_files:
  - path: /var/www/html/db.php
    permissions: '0644'
    content: |
      <?php
      // Conexión a la BBDD interna (credenciales en claro -> hallazgo)
      $DB_HOST = '10.30.10.10';
      $DB_USER = 'apexweb';
      $DB_PASS = 'apexweb';
      $DB_NAME = 'apexgestoria';
      $conn = @mysqli_connect($DB_HOST, $DB_USER, $DB_PASS, $DB_NAME);
      ?>

  - path: /var/www/html/index.php
    permissions: '0644'
    content: |
      <!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
      <title>Apex Gestoría</title>
      <style>body{font-family:Arial;margin:0;background:#f4f6f9;color:#222}
      header{background:#16407a;color:#fff;padding:40px;text-align:center}
      .c{max-width:800px;margin:30px auto;padding:0 20px}a{color:#16407a}</style></head>
      <body><header><h1>Apex Gestoría</h1>
      <p>Assessorament fiscal, laboral i comptable</p></header>
      <div class="c"><h2>Benvinguts</h2>
      <p>Portal de clients d'Apex Gestoría. Accedeixi a la seva àrea privada.</p>
      <p><a href="login.php">&#128274; Àrea de clients</a></p></div></body></html>

  - path: /var/www/html/login.php
    permissions: '0644'
    content: |
      <?php
      session_start();
      require 'db.php';
      $err = '';
      if ($_SERVER['REQUEST_METHOD'] === 'POST') {
          $u = $_POST['usuario'] ?? '';
          $p = $_POST['password'] ?? '';
          // VULNERABLE: consulta construida por concatenación (SQL injection)
          $q = "SELECT * FROM usuarios WHERE usuario='$u' AND password='$p'";
          $r = mysqli_query($conn, $q);
          if ($r && mysqli_num_rows($r) > 0) {
              $row = mysqli_fetch_assoc($r);
              $_SESSION['user'] = $row['usuario'];
              $_SESSION['rol']  = $row['rol'];
              header('Location: panel.php');
              exit;
          } else {
              $err = 'Credencials incorrectes';
          }
      }
      ?>
      <!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Login - Apex</title>
      <style>body{font-family:Arial;background:#f4f6f9}form{max-width:320px;margin:80px auto;
      background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px #0002}
      input{width:100%;padding:8px;margin:6px 0;box-sizing:border-box}
      button{width:100%;padding:10px;background:#16407a;color:#fff;border:0;border-radius:4px}
      .e{color:#c00;text-align:center}</style></head><body>
      <form method="post"><h2>Àrea de clients</h2>
      <input name="usuario" placeholder="Usuari">
      <input name="password" type="password" placeholder="Contrasenya">
      <button>Entrar</button>
      <p class="e"><?php echo htmlspecialchars($err); ?></p></form></body></html>

  - path: /var/www/html/panel.php
    permissions: '0644'
    content: |
      <?php
      session_start();
      require 'db.php';
      if (!isset($_SESSION['user'])) { header('Location: login.php'); exit; }
      $msg = '';
      // VULNERABLE: subida de ficheros sin ninguna validación de tipo/extensión
      if (!empty($_FILES['archivo']['name'])) {
          $dest = 'uploads/' . basename($_FILES['archivo']['name']);
          if (move_uploaded_file($_FILES['archivo']['tmp_name'], $dest)) {
              $msg = 'Document pujat correctament: ' . $dest;
          }
      }
      $res = mysqli_query($conn, "SELECT nombre,nif,email,iban FROM clientes");
      ?>
      <!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Panell - Apex</title>
      <style>body{font-family:Arial;background:#f4f6f9;margin:0}
      header{background:#16407a;color:#fff;padding:16px 24px}
      .c{max-width:900px;margin:20px auto;padding:0 20px}
      table{width:100%;border-collapse:collapse;background:#fff}
      td,th{border:1px solid #ddd;padding:8px;text-align:left}
      .ok{color:#080}</style></head><body>
      <header>Apex Gestoría — Panell intern (<?php echo htmlspecialchars($_SESSION['user']); ?>)</header>
      <div class="c">
      <h3>Documents</h3>
      <form method="post" enctype="multipart/form-data">
        <input type="file" name="archivo"><button>Pujar</button>
      </form>
      <p class="ok"><?php echo htmlspecialchars($msg); ?></p>
      <h3>Clients</h3><table><tr><th>Nom</th><th>NIF</th><th>Email</th><th>IBAN</th></tr>
      <?php while ($res && $row = mysqli_fetch_assoc($res)) {
        echo '<tr><td>'.htmlspecialchars($row['nombre']).'</td><td>'.htmlspecialchars($row['nif']).
             '</td><td>'.htmlspecialchars($row['email']).'</td><td>'.htmlspecialchars($row['iban']).'</td></tr>';
      } ?>
      </table></div></body></html>

runcmd:
  - systemctl enable --now qemu-guest-agent
  - mkdir -p /var/www/html/uploads
  - chmod 0777 /var/www/html/uploads
  - rm -f /var/www/html/index.html
  - systemctl enable --now apache2
  - systemctl restart apache2

final_message: "apex-web cloud-init COMPLETADO tras $UPTIME segundos"
