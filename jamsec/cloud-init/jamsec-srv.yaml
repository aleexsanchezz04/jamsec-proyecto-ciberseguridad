#cloud-config
# ============================================================================
#  jamsec-srv — Servidor de ficheros interno de JAMSEC (Samba)
#  Debian 13 + Samba.  Zona SERVICIOS 10.20.30.10/24, gw 10.20.30.1
#  Aislado: la DMZ NO puede alcanzar esta red (regla en jamsec-fw).
# ============================================================================
hostname: jamsec-srv
fqdn: jamsec-srv.jamsec.cat
manage_etc_hosts: true

users:
  - name: jamsec
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: Jamsec2026!
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHJrzrkaIbwLspktR5Xg/s/nwWklhrQXUqp1vbZgWyYU admin@debian-server
ssh_pwauth: true

package_update: true
packages:
  - samba
  - qemu-guest-agent
  - bind9-dnsutils

write_files:
  - path: /etc/samba/smb.conf
    permissions: '0644'
    content: |
      [global]
         workgroup = JAMSEC
         server string = JAMSEC File Server
         security = user
         map to guest = bad user
         log file = /var/log/samba/log.%m
         max log size = 1000
         server min protocol = SMB2

      [compartido]
         comment = Recursos internos JAMSEC
         path = /srv/compartido
         browseable = yes
         read only = no
         valid users = jamsec
         create mask = 0660
         directory mask = 0770

runcmd:
  - systemctl enable --now qemu-guest-agent
  - mkdir -p /srv/compartido
  - chown jamsec:jamsec /srv/compartido
  - chmod 0770 /srv/compartido
  - printf 'Documento interno de JAMSEC - confidencial\n' > /srv/compartido/LEEME.txt
  - chown jamsec:jamsec /srv/compartido/LEEME.txt
  - printf 'Jamsec2026!\nJamsec2026!\n' | smbpasswd -s -a jamsec
  - smbpasswd -e jamsec
  - systemctl enable --now smbd
  - systemctl restart smbd

final_message: "jamsec-srv cloud-init COMPLETADO tras $UPTIME segundos"
